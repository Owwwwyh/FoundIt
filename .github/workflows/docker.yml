name: Docker stack

# Builds the full Docker stack (db + PHP API + Vue frontend) on GitHub's
# runners, starts it, and verifies the API serves the seeded data.
# Runs in the cloud — no local Docker install needed.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & start the stack
        run: docker compose up -d --build

      - name: Wait for the API and verify seeded items
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8081/api/items > /tmp/items.json; then
              echo "API responded:"; head -c 400 /tmp/items.json; echo
              if grep -q '"items"' /tmp/items.json; then
                echo "OK: /api/items returned the seeded data"; exit 0
              fi
            fi
            echo "waiting for API... attempt $i"; sleep 5
          done
          echo "::error::API did not return seeded items in time"; exit 1

      - name: Verify the frontend is served
        run: curl -sf -o /dev/null -w "web HTTP %{http_code}\n" http://localhost:8080

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
