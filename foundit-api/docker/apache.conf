<VirtualHost *:80>
    # Slim's front controller and .htaccess live in public/
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        # AllowOverride All lets public/.htaccess do the URL rewriting.
        # (Apache forbids inline comments on a directive line.)
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
